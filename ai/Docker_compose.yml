# docker-compose cho phần AI: pgvector + search (8001) + chat (8002)
# Chạy:  docker compose -f Docker_compose.yml up -d --build
# Trước lần chạy đầu: nạp dump vector (xem HUONG_DAN_KET_NOI_FRONTEND.md mục D)
services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-recipe123}
      POSTGRES_DB: recipedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recipedb"]
      interval: 5s
      timeout: 3s
      retries: 20

  search:
    build: .
    command: uvicorn search:app --host 0.0.0.0 --port 8001
    env_file: .env
    environment:
      PG_DSN: postgresql://postgres:${PG_PASSWORD:-recipe123}@pgvector:5432/recipedb
      HF_HOME: /hf-cache          # cache model embedding, khỏi tải lại mỗi lần restart
    volumes:
      - hfcache:/hf-cache
    ports:
      - "8001:8001"
    depends_on:
      pgvector:
        condition: service_healthy
    restart: unless-stopped

  chat:
    build: .
    command: uvicorn chat:app --host 0.0.0.0 --port 8002
    env_file: .env
    ports:
      - "8002:8002"
    restart: unless-stopped

volumes:
  pgdata:
  hfcache:
